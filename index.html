<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>MotionOps · Founder posts</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            .staticrypt-hr {
                margin-top: 20px;
                margin-bottom: 20px;
                border: 0;
                border-top: 1px solid #eee;
            }

            .staticrypt-page {
                width: 360px;
                padding: 8% 0 0;
                margin: auto;
                box-sizing: border-box;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: #ffffff;
                max-width: 360px;
                margin: 0 auto 100px;
                padding: 45px;
                text-align: center;
                box-shadow: 0 0 20px 0 rgba(0, 0, 0, 0.2), 0 5px 5px 0 rgba(0, 0, 0, 0.24);
            }

            .staticrypt-form input[type="password"],
            input[type="text"] {
                background: inherit;
                border: 0;
                box-sizing: border-box; /* This ensures padding is included in the total width */
                font-size: 14px;
                outline: 0;
                padding: 15px 30px 15px 15px; /* Adjust the padding to ensure there is space for the icon */
                width: 100%;
            }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: #f2f2f2;
                width: 100%;
                border: 0;
                margin: 0 0 15px;
                box-sizing: border-box;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                opacity: 60%;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                outline: 0;
                background: #4CAF50;
                width: 100%;
                border: 0;
                padding: 15px;
                color: #ffffff;
                font-size: 14px;
                cursor: pointer;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: #4CAF50;
                filter: brightness(92%);
            }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                margin-bottom: 1em;
                background: #76B852;
                font-family: "Arial", sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-instructions {
                margin-top: -1em;
                margin-bottom: 1em;
            }

            .staticrypt-title {
                font-size: 1.5em;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 1em;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.5);
                margin-right: 1em;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid gray;
                border-right-color: transparent;
                border-radius: 50%;
                -webkit-animation: spinner-border 0.75s linear infinite;
                animation: spinner-border 0.75s linear infinite;
                animation-duration: 0.75s;
                animation-timing-function: linear;
                animation-delay: 0s;
                animation-iteration-count: infinite;
                animation-direction: normal;
                animation-fill-mode: none;
                animation-play-state: running;
                animation-name: spinner-border;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                input[type="text"] {
                    font-size: 16px;
                }
            }

*{ box-sizing:border-box; }
html, body, .staticrypt-html, .staticrypt-body { height:100%; margin:0; }
.staticrypt-html, .staticrypt-body{
  background:
    radial-gradient(900px 520px at 50% -8%, rgba(65,174,117,.20), transparent 60%),
    radial-gradient(700px 480px at 88% 112%, rgba(47,86,217,.16), transparent 62%),
    var(--navy) !important;
  font-family:'Inter',system-ui,sans-serif !important; color:var(--ink) !important;
}
.staticrypt-content, .staticrypt-page{ background:transparent !important; }
.staticrypt-page{ min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:24px !important; }
.staticrypt-form{
  position:relative; width:min(384px,94vw); background:var(--panel) !important;
  border:1px solid var(--line) !important; border-radius:20px !important;
  padding:40px 32px 30px !important;
  box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 24px 60px -18px rgba(0,0,0,.65) !important;
  animation:fr-rise .5s cubic-bezier(.2,.7,.2,1) both;
}
@keyframes fr-rise{ from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none} }
@media (prefers-reduced-motion:reduce){ .staticrypt-form{ animation:none } }
/* logomark: MotionOps hexagon cog */
.staticrypt-form::before{
  content:''; display:block; width:60px; height:60px; margin:0 auto 18px;
  background:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Cpath%20d='M12%201.5l9%205.2v10.6l-9%205.2-9-5.2V6.7z'%20fill='%2341AE75'/%3E%3Cpath%20d='M8%2015.5V9l4%203.4L16%209v6.5'%20stroke='white'%20stroke-width='1.7'%20fill='none'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat center/contain;
  filter:drop-shadow(0 10px 20px rgba(65,174,117,.55));
}
.staticrypt-instructions{ margin:0 0 22px !important; text-align:center; }
.staticrypt-title{ color:var(--ink) !important; font-family:'Plus Jakarta Sans',sans-serif !important; font-weight:800 !important; font-size:23px !important; letter-spacing:-.02em !important; margin:0 !important; }
.staticrypt-instructions::after{ content:'Founder posts'; display:block; margin-top:5px; color:var(--ink-3); font-size:12.5px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; }
.staticrypt-instructions p:empty{ display:none !important; }
.staticrypt-hr{ display:none !important; }
#staticrypt-form{ display:flex; flex-direction:column; gap:12px; }
.staticrypt-password-container{ position:relative; background:transparent !important; border:none !important; box-shadow:none !important; margin:0 !important; }
.staticrypt-password, input[type=password]{
  width:100% !important; background:var(--panel-2) !important; border:1.5px solid var(--line) !important;
  border-radius:12px !important; color:var(--ink) !important; font-family:'Inter',sans-serif !important;
  font-size:15px !important; letter-spacing:.02em; padding:14px 44px 14px 16px !important; text-align:center;
  outline:none !important; box-shadow:none !important; transition:border-color .15s, box-shadow .15s;
}
.staticrypt-password::placeholder, input[type=password]::placeholder{ color:var(--ink-3) !important; letter-spacing:.02em !important; }
.staticrypt-password:focus, input[type=password]:focus{ border-color:var(--green) !important; box-shadow:0 0 0 4px rgba(65,174,117,.18) !important; }
.staticrypt-toggle-password-visibility{ position:absolute !important; right:12px; top:50%; transform:translateY(-50%); width:19px; height:19px; cursor:pointer; opacity:.75; filter:invert(72%) sepia(12%) saturate(700%) hue-rotate(175deg) !important; }
.staticrypt-toggle-password-visibility:hover{ opacity:1; }
.staticrypt-decrypt-button{
  width:100% !important; background:var(--green) !important; border:none !important; border-radius:12px !important;
  color:#fff !important; font-family:'Plus Jakarta Sans',sans-serif !important; font-weight:800 !important;
  font-size:15px !important; padding:14px !important; cursor:pointer; margin:2px 0 0 !important;
  transition:background .15s, transform .05s; box-shadow:0 10px 24px -12px rgba(65,174,117,.8);
}
.staticrypt-decrypt-button:hover{ background:var(--green-d) !important; }
.staticrypt-decrypt-button:active{ transform:translateY(1px); }
.staticrypt-remember{ display:flex !important; align-items:center; justify-content:center; gap:8px; margin-top:4px !important; }
.staticrypt-remember-label, .staticrypt-form label{ color:var(--ink-2) !important; font-size:12.5px !important; font-weight:500; }
.staticrypt-remember input{ accent-color:var(--green); }
.staticrypt-spinner{ border-top-color:var(--green) !important; }
</style>
