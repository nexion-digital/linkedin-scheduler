<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MotionOps Post Review</title>
<style>
  /* MotionOps brand: dark navy chrome, light content, green #41AE75 */
  :root{
    --navy:#0D1B2E; --navy-2:#122540; --navy-line:#1e3352;
    --green:#41AE75; --green-dark:#35935f; --green-soft:#e3f4eb;
    --bg:#f2f5f8; --panel:#ffffff; --panel-2:#eef2f6;
    --ink:#16233a; --ink-2:#5b6b82; --ink-3:#8d9ab0;
    --line:#dfe6ee; --line-2:#e9eef4;
    --orange:#e8862e; --orange-soft:#fdf0e2;
    --red:#d64545; --red-soft:#fbe9e9;
    --gray:#5b6b82; --gray-soft:#eaeef3;
    --shadow:0 1px 2px rgba(13,27,46,.06),0 8px 28px rgba(13,27,46,.09);
    color-scheme: light;
  }
  *{box-sizing:border-box}
  [hidden]{display:none!important}
  html,body{margin:0}
  body{
    font-family:"Plus Jakarta Sans","Inter","Segoe UI",system-ui,-apple-system,sans-serif;
    background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5;
  }
  button{font:inherit;cursor:pointer}
  textarea,input,select{font:inherit;color:inherit}

  /* ---------- dark navbar ---------- */
  .nav{background:var(--navy);position:sticky;top:0;z-index:40}
  .nav-in{max-width:680px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px}
  .logo{display:flex;align-items:center;gap:9px;color:#fff;font-weight:800;font-size:16px;letter-spacing:-.01em}
  .logo img{width:28px;height:28px;border-radius:7px;flex:none}
  .logo small{display:block;font-size:10px;font-weight:600;color:#7f92ad;letter-spacing:.1em;text-transform:uppercase;line-height:1.1}
  .fswitch{margin-left:auto;display:flex;background:var(--navy-2);border:1px solid var(--navy-line);border-radius:99px;padding:3px}
  .fswitch button{border:0;background:none;border-radius:99px;padding:5px 14px;font-weight:700;font-size:13.5px;color:#8fa2bd;display:flex;align-items:center;gap:7px}
  .fswitch button.on{background:var(--green);color:#fff}
  .avatar{width:22px;height:22px;border-radius:50%;object-fit:cover;flex:none;display:block}
  .fswitch button.on .avatar{outline:2px solid rgba(255,255,255,.55)}

  /* ---------- green band ---------- */
  .band{background:var(--green)}
  .band-in{max-width:680px;margin:0 auto;padding:18px 16px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .band h1{margin:0;color:#fff;font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1.15}
  .band .sub{color:rgba(255,255,255,.85);font-size:12.5px;font-weight:600}
  .seg{margin-left:auto;display:flex;background:rgba(13,27,46,.35);border-radius:10px;padding:3px}
  .seg button{border:0;background:none;border-radius:8px;padding:6px 16px;font-weight:700;font-size:13.5px;color:rgba(255,255,255,.75)}
  .seg button.on{background:#fff;color:var(--green-dark)}
  .seg .badge{background:var(--orange);color:#fff;font-size:10.5px;font-weight:800;border-radius:99px;padding:1px 6px;margin-left:6px;vertical-align:1px}

  .wrap{max-width:680px;margin:0 auto;padding:20px 16px 80px;position:relative}

  /* ---------- feed ---------- */
  .feed{display:flex;flex-direction:column;gap:18px}
  .post{display:flex;flex-direction:column;gap:10px}
  .post.st-published{opacity:.85}
  .p-top{display:flex;align-items:center;gap:11px;padding:14px 16px 10px}
  .p-top .avatar{width:42px;height:42px}
  .p-top .who b{display:block;font-size:15px;font-weight:800}
  .p-top .who span{font-size:12.5px;color:var(--ink-3)}
  .pill{margin-left:auto;font-size:11.5px;font-weight:800;border-radius:6px;padding:4px 10px;white-space:nowrap;letter-spacing:.02em}
  .pill.review{background:var(--orange-soft);color:var(--orange)}
  .pill.scheduled{background:var(--green-soft);color:var(--green-dark)}
  .pill.rejected{background:var(--red-soft);color:var(--red)}
  .pill.published{background:var(--gray-soft);color:var(--gray)}

  .p-media{height:320px;display:grid;place-items:center;position:relative;overflow:hidden}
  .p-media>img,.p-media>video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .p-media svg{width:44px;height:44px;stroke:#fff;fill:none;stroke-width:1.5;opacity:.92;position:relative}
  .p-media .tag{position:absolute;bottom:10px;left:10px;background:rgba(13,27,46,.6);color:#fff;font-size:10.5px;font-weight:800;letter-spacing:.06em;padding:3px 8px;border-radius:6px;text-transform:uppercase}

  .p-cap{padding:12px 16px 4px}
  .p-cap textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:var(--bg);resize:vertical;min-height:120px;padding:10px 12px;line-height:1.55;font-family:"Inter","Plus Jakarta Sans",system-ui,sans-serif}
  .p-cap textarea:focus{outline:none;border-color:var(--green);background:var(--panel);box-shadow:0 0 0 3px var(--green-soft)}
  .p-when{display:flex;align-items:center;gap:8px;padding:10px 16px 0;font-size:13px;color:var(--ink-2);font-weight:600}
  .p-when input{border:1px solid var(--line);border-radius:8px;padding:6px 9px;background:var(--panel);font-variant-numeric:tabular-nums;font-size:13.5px}
  .p-when input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}

  .p-actions{display:flex;gap:10px;padding:0}
  .btn{flex:1;border-radius:10px;padding:11px;font-weight:800;font-size:14.5px;border:1px solid var(--line);background:var(--panel);color:var(--ink)}
  .btn.schedule{background:var(--green);border-color:var(--green);color:#fff}
  .btn.schedule:hover{background:var(--green-dark)}
  .btn.reject{color:var(--red);border-color:color-mix(in srgb,var(--red) 45%,transparent)}
  .btn.reject:hover{background:var(--red-soft)}
  .btn:disabled{opacity:.55;cursor:default}

  .p-reason{padding:0;display:none}
  .p-reason.open{display:block}
  .p-reason label{display:block;font-size:12px;font-weight:800;color:var(--red);margin-bottom:6px}
  .p-reason textarea{width:100%;border:1px solid color-mix(in srgb,var(--red) 40%,transparent);border-radius:10px;background:var(--red-soft);padding:10px 12px;min-height:70px;resize:vertical}
  .p-reason textarea:focus{outline:none;border-color:var(--red)}
  .p-reason .row{display:flex;gap:8px;margin-top:8px;justify-content:flex-end}
  .btn.sm{flex:none;padding:8px 16px;font-size:13.5px}
  .btn.senddark{background:var(--red);border-color:var(--red);color:#fff}

  .p-note{margin:0;background:var(--red-soft);border-radius:10px;padding:10px 13px;font-size:13.5px}
  .p-note b{color:var(--red);font-size:12px;display:block;margin-bottom:2px}

  .feed-done{text-align:center;color:var(--ink-3);font-size:13.5px;padding:26px 0 8px;font-weight:600}

  /* ---------- calendar ---------- */
  .cal{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
  .cal-head{display:flex;align-items:baseline;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line-2)}
  .cal-head b{font-size:16px;font-weight:800;color:var(--green-dark)}
  .cal-head span{font-size:12px;color:var(--ink-3);margin-left:auto}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .dow{padding:8px 0;text-align:center;font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);border-bottom:1px solid var(--line-2)}
  .day{aspect-ratio:1/.95;border-bottom:1px solid var(--line-2);border-right:1px solid var(--line-2);padding:7px 0 0;display:flex;flex-direction:column;align-items:center;gap:5px}
  .day:nth-child(7n){border-right:0}
  .day .dn{font-size:12.5px;font-weight:700;color:var(--ink-2);font-variant-numeric:tabular-nums;width:24px;height:24px;display:grid;place-items:center;border-radius:99px}
  .day.today .dn{background:var(--green);color:#fff}
  .day.pad{background:var(--panel-2)}
  .day.dragover{outline:2px dashed var(--green);outline-offset:-3px;background:var(--green-soft)}
  .dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;padding:0 4px}
  .dot{width:11px;height:11px;border-radius:99px;border:0;padding:0;cursor:grab}
  .dot:active{cursor:grabbing}
  .dot.review{background:var(--orange)}
  .dot.scheduled{background:var(--green)}
  .dot.rejected{background:var(--red)}
  .dot.published{background:var(--ink-3);opacity:.55}
  .legend{display:flex;gap:16px;padding:12px 18px;font-size:12px;color:var(--ink-2);border-top:1px solid var(--line-2);flex-wrap:wrap;font-weight:600}
  .legend i{width:9px;height:9px;border-radius:99px;display:inline-block;margin-right:5px}

  /* ---------- post modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(13,27,46,.55);z-index:60;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:30px 14px}
  .scrim.open{display:flex}
  .modal{background:var(--panel);border-radius:14px;width:min(560px,100%);box-shadow:var(--shadow);overflow:hidden;margin:auto 0}
  .m-head{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line-2)}
  .m-head b{font-size:15px;font-weight:800}
  .m-head .pill{margin-left:auto}
  .m-close{background:none;border:0;color:var(--ink-3);font-size:22px;line-height:1;padding:2px 6px}
  .m-media{height:240px;display:grid;place-items:center;position:relative;overflow:hidden}
  .m-media>img,.m-media>video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .m-media svg{width:38px;height:38px;stroke:#fff;fill:none;stroke-width:1.5;opacity:.92;position:relative}
  .m-media .tag{position:absolute;bottom:10px;left:10px;background:rgba(13,27,46,.6);color:#fff;font-size:10.5px;font-weight:800;letter-spacing:.06em;padding:3px 8px;border-radius:6px;text-transform:uppercase}
  .m-replace{position:absolute;top:10px;right:10px;background:rgba(13,27,46,.65);color:#fff;border:0;border-radius:8px;padding:7px 12px;font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:6px}
  .m-replace:hover{background:rgba(13,27,46,.85)}
  .m-replace svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:1.8}
  .m-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:12px}
  .m-body textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:var(--bg);resize:vertical;min-height:130px;padding:10px 12px;line-height:1.55;font-family:"Inter","Plus Jakarta Sans",system-ui,sans-serif}
  .m-body textarea:focus{outline:none;border-color:var(--green);background:var(--panel);box-shadow:0 0 0 3px var(--green-soft)}
  .m-when{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2);font-weight:600}
  .m-when input{border:1px solid var(--line);border-radius:8px;padding:6px 9px;background:var(--panel);font-variant-numeric:tabular-nums;font-size:13.5px}
  .m-when input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .m-actions{display:flex;gap:10px}

  /* ---------- inline compose (+ card in the feed) ---------- */
  .plus-card{border:2px dashed var(--line);border-radius:12px;background:none;box-shadow:none;display:flex;align-items:center;justify-content:center;gap:11px;padding:18px;color:var(--ink-3);font-weight:800;font-size:15px;cursor:pointer;width:100%}
  .plus-card:hover{border-color:var(--green);color:var(--green-dark);background:var(--green-soft)}
  .plus-card .plus{width:34px;height:34px;border-radius:99px;background:var(--green);flex:none;display:inline-flex;align-items:center;justify-content:center}
  .plus-card .plus svg{width:18px;height:18px;stroke:#fff;stroke-width:2.4;stroke-linecap:round}

  /* ---------- LinkedIn preview card ---------- */
  .li{background:#fff;border:1px solid #e2e6ea;border-radius:10px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .li-h{display:flex;gap:10px;padding:12px 14px 0;align-items:flex-start}
  .li-av{width:48px;height:48px;border-radius:50%;object-fit:cover;flex:none}
  .li-id{flex:1;min-width:0}
  .li-name{font-family:'Inter',system-ui,sans-serif;font-weight:600;font-size:14px;color:#1b1f23;line-height:1.25}
  .li-name .deg{color:rgba(0,0,0,.6);font-weight:400}
  .li-sub{font-family:'Inter',system-ui,sans-serif;font-size:12px;color:rgba(0,0,0,.6);line-height:1.3;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .li-meta{font-family:'Inter',system-ui,sans-serif;font-size:12px;color:rgba(0,0,0,.6);display:flex;align-items:center;gap:4px;margin-top:1px}
  .li-meta svg{width:12px;height:12px;fill:rgba(0,0,0,.55)}
  .li-more{margin-left:auto;color:rgba(0,0,0,.5);font-weight:800;letter-spacing:1.5px;font-size:16px;padding:0 2px;align-self:flex-start}
  .li-text{font-family:'Inter',system-ui,sans-serif;font-size:14px;color:#1b1f23;line-height:1.45;white-space:pre-wrap;word-wrap:break-word;padding:10px 14px 12px;margin:0;border:0;width:100%;background:transparent;resize:none;display:block}
  textarea.li-text{min-height:22px;border-radius:8px;transition:background .12s,box-shadow .12s}
  textarea.li-text:hover{background:#f3f6f8}
  textarea.li-text:focus{outline:none;background:#fff;box-shadow:0 0 0 2px var(--green-soft),0 0 0 1px var(--green) inset}
  .li-media{width:100%;background:#eef1f4;border-top:1px solid #edf0f2;position:relative;max-height:400px;overflow:hidden;display:flex;justify-content:center}
  .li-media img,.li-media video{width:100%;max-height:400px;object-fit:cover;display:block}
  .li-media .ph{height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#8a97a6;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;width:100%}
  .li-media .ph svg{width:34px;height:34px;stroke:#b6c0cc;fill:none;stroke-width:1.5}
  /* LinkedIn bottom action bar (compact, matches real mobile layout) */
  .li-foot{display:flex;align-items:center;gap:8px;padding:8px 12px;margin-top:8px;border-top:1px solid #e9edf0}
  .li-me{display:flex;align-items:center;gap:1px;flex:none}
  .li-me img{width:26px;height:26px;border-radius:50%;object-fit:cover}
  .li-me .chev{width:15px;height:15px;stroke:rgba(0,0,0,.55);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  .li-foot-acts{display:flex;align-items:center;gap:6px;margin-left:2px}
  .li-foot-acts button{border:0;background:none;padding:7px;border-radius:8px;display:flex;align-items:center;cursor:pointer;color:rgba(0,0,0,.62)}
  .li-foot-acts button:hover{background:#f3f6f8;color:#1b1f23}
  .li-foot-acts svg{width:22px;height:22px;fill:none;stroke:currentColor}
  .li-reacts{margin-left:auto;display:flex;align-items:center}
  .li-reacts i{width:19px;height:19px;border-radius:50%;display:grid;place-items:center;margin-left:-5px;box-shadow:0 0 0 1.5px #fff}
  .li-reacts i:first-child{margin-left:0}
  .li-reacts i svg{width:11px;height:11px;fill:#fff}

  /* review toolbar around the preview */
  .rev-bar{display:flex;align-items:center;gap:8px;padding:0}
  .rev-when{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-2);font-weight:600}
  .rev-when input{border:1px solid var(--line);border-radius:8px;padding:6px 8px;background:var(--panel);font-variant-numeric:tabular-nums;font-size:12.5px}
  .rev-when input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .li-replace{position:absolute;top:10px;right:10px;background:rgba(13,27,46,.7);color:#fff;border:0;border-radius:8px;padding:7px 12px;font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:'Plus Jakarta Sans',sans-serif;z-index:2}
  .li-replace:hover{background:rgba(13,27,46,.9)}
  .li-replace svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:1.8}
  .btn.delete{flex:none;color:var(--ink-2);border-color:var(--line);background:var(--panel);padding:11px 14px}
  .btn.delete:hover{color:var(--red);border-color:color-mix(in srgb,var(--red) 45%,transparent);background:var(--red-soft)}

  /* ---------- confirm dialog ---------- */
  .cf-scrim{position:fixed;inset:0;background:rgba(13,27,46,.55);z-index:80;display:none;align-items:center;justify-content:center;padding:20px}
  .cf-scrim.open{display:flex}
  .cf{background:var(--panel);border-radius:16px;width:min(400px,100%);box-shadow:var(--shadow);padding:22px 22px 18px;text-align:center;animation:cf-pop .18s ease both}
  @keyframes cf-pop{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.cf{animation:none}}
  .cf-ic{width:46px;height:46px;border-radius:13px;margin:0 auto 12px;display:grid;place-items:center}
  .cf-ic.go{background:var(--green-soft)} .cf-ic.go svg{stroke:var(--green-dark)}
  .cf-ic.warn{background:var(--red-soft)} .cf-ic.warn svg{stroke:var(--red)}
  .cf-ic svg{width:24px;height:24px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .cf h4{margin:0 0 6px;font-size:17px;font-weight:800}
  .cf p{margin:0 0 18px;font-size:13.5px;color:var(--ink-2);line-height:1.5}
  .cf-row{display:flex;gap:10px}
  .cf-row .btn{flex:1}
  .compose{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column;gap:12px}
  .compose h3{margin:0;font-size:15px;font-weight:800}
  .c-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;font-size:13px;color:var(--ink-2);font-weight:600}
  .c-row select,.c-row input[type=date],.c-row input[type=time]{border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:var(--panel);font-size:13.5px}
  .c-row select:focus,.c-row input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .c-up{border:1.5px dashed var(--line);border-radius:10px;height:150px;display:grid;place-items:center;color:var(--ink-3);font-weight:600;font-size:13px;cursor:pointer;position:relative;overflow:hidden;background:var(--bg)}
  .c-up:hover{border-color:var(--green);color:var(--green-dark)}
  .c-up img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .c-up span{position:relative;background:rgba(255,255,255,.85);border-radius:8px;padding:4px 10px}
  .compose textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:var(--bg);resize:vertical;min-height:110px;padding:10px 12px;line-height:1.55;font-family:"Inter","Plus Jakarta Sans",system-ui,sans-serif}
  .compose textarea:focus{outline:none;border-color:var(--green);background:var(--panel);box-shadow:0 0 0 3px var(--green-soft)}

  .arow{display:grid;grid-template-columns:64px 1fr auto;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;box-shadow:var(--shadow);align-items:center}
  .arow .thumb{width:64px;height:64px;border-radius:8px;position:relative;overflow:hidden;display:grid;place-items:center;flex:none}
  .arow .thumb>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .arow .thumb svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:1.6;position:relative}
  .arow .amid{min-width:0}
  .arow .amid .cap1{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .arow .amid .meta{font-size:12px;color:var(--ink-3);font-weight:600;display:flex;align-items:center;gap:6px;margin-top:2px}
  .arow .amid .meta img{width:16px;height:16px;border-radius:50%;object-fit:cover}
  .arow .note{font-size:12.5px;color:var(--red);margin-top:4px;background:var(--red-soft);border-radius:6px;padding:4px 8px;display:inline-block}
  .arow .acts{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
  .abtn{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:5px 12px;font-weight:700;font-size:12px;color:var(--ink-2)}
  .abtn.fix{background:var(--green);border-color:var(--green);color:#fff}
  .abtn.del:hover{color:var(--red);border-color:var(--red)}
  .asec{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin:6px 2px -8px}

  /* ---------- stats ---------- */
  .stats{display:flex;flex-direction:column;gap:16px}
  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:520px){.stat-row{grid-template-columns:1fr 1fr}}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
  .stat .k{font-size:24px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .stat .l{font-size:12px;color:var(--ink-3);font-weight:700;margin-top:2px}
  .stat .d{font-size:11.5px;font-weight:800;margin-top:6px}
  .stat .d.up{color:var(--green-dark)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
  .card h3{margin:0;font-size:14px;font-weight:800}
  .card .sub{font-size:12px;color:var(--ink-3);font-weight:600;margin-top:1px}
  .card-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .mini-seg{margin-left:auto;display:flex;background:var(--panel-2);border:1px solid var(--line-2);border-radius:8px;padding:2px}
  .mini-seg button{border:0;background:none;border-radius:6px;padding:4px 12px;font-weight:700;font-size:12px;color:var(--ink-2)}
  .mini-seg button.on{background:var(--panel);color:var(--green-dark);box-shadow:var(--shadow)}

  .chart-svg{width:100%;height:170px;display:block}
  .chart-x{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-3);font-weight:700;margin-top:6px;font-variant-numeric:tabular-nums}

  .ptable-wrap{overflow-x:auto}
  table.ptable{border-collapse:collapse;width:100%;min-width:520px;font-size:13px}
  .ptable th{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3);text-align:right;padding:8px 10px;border-bottom:1px solid var(--line-2);font-weight:800;white-space:nowrap}
  .ptable th:first-child{text-align:left}
  .ptable td{padding:9px 10px;border-bottom:1px solid var(--line-2);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .ptable td:first-child{text-align:left;white-space:normal;min-width:190px}
  .ptable tr:last-child td{border-bottom:0}
  .ptable .pt{font-weight:700;display:block;line-height:1.3}
  .ptable .pd{font-size:11.5px;color:var(--ink-3);font-weight:600}
  .ptable .eng{font-weight:800;color:var(--green-dark)}
  .ptable tr.best td{background:var(--green-soft)}
  .ptable tr.best .pt::after{content:" ★";color:var(--green-dark)}

  .fmt-row{display:flex;align-items:center;gap:10px;margin-top:10px}
  .fmt-row .fl{width:76px;font-size:12.5px;font-weight:700;color:var(--ink-2);flex:none}
  .fmt-bar{flex:1;height:22px;background:var(--panel-2);border-radius:6px;overflow:hidden}
  .fmt-bar i{display:block;height:100%;background:var(--green);border-radius:6px}
  .fmt-row .fv{width:52px;text-align:right;font-size:12.5px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--green-dark);flex:none}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--navy);color:#fff;padding:10px 18px;border-radius:99px;font-weight:700;font-size:13px;transition:transform .25s;z-index:90;max-width:90vw;text-align:center;box-shadow:var(--shadow)}
  .toast.show{transform:translateX(-50%)}
  @media (prefers-reduced-motion:reduce){.toast{transition:none}}

  .g1{background:linear-gradient(135deg,#0D1B2E,#2f56d9)}
  .g2{background:linear-gradient(135deg,#1b3a5c,#41AE75)}
  .g3{background:linear-gradient(135deg,#0d6b4a,#7cb342)}
  .g4{background:linear-gradient(135deg,#0D1B2E,#e8862e)}
  .g5{background:linear-gradient(135deg,#25354c,#8d9ab0)}
  .g6{background:linear-gradient(135deg,#0D1B2E,#41AE75)}
</style>

/* ---- backend (nexion-social Worker + ContentStudio) ---- */
const API_BASE = 'https://nexion-social.nexion.workers.dev';
const NEXION_KEY = (typeof window!=='undefined' && localStorage.getItem('nexion_key')) || ''; // baked at deploy time
async function api(path, opts={}){
  const r = await fetch(API_BASE + path, {
    ...opts,
    headers: { 'X-Nexion-Key': NEXION_KEY, ...(opts.body ? {'Content-Type':'application/json'} : {}), ...(opts.headers||{}) },
  });
  const t = await r.text();
  let b; try { b = JSON.parse(t); } catch { b = { raw:t }; }
  if(!r.ok || b.error) throw new Error(b.error || ('HTTP '+r.status));
  return b;
}
// upload a File to R2 via the Worker, returns {key, url, kind}
async function uploadFile(file){
  const ext = (file.name.split('.').pop()||'').toLowerCase();
  const r = await fetch(`${API_BASE}/upload?ext=${encodeURIComponent(ext)}`, {
    method:'PUT', headers:{'X-Nexion-Key':NEXION_KEY}, body:file,
  });
  const b = await r.json();
  if(!r.ok || b.error) throw new Error(b.error||'upload failed');
  return b; // {key, url, kind}
}

let posts = [];      // adapted from the API
let statsData = null;

// map an API post to the shape the render code expects (adds f/cap/img/g aliases)
function adapt(p){
  const key = (p.mediaKeys && p.mediaKeys[0]) || null;
  const gi = Math.abs([...String(p.id)].reduce((a,c)=>a+c.charCodeAt(0),0)) % GRADS.length;
  return { ...p, f:p.founder, cap:p.caption||'', img: key ? `${API_BASE}/v/${key}` : null,
           vid: (p.mediaKind==='video'), g: GRADS[gi] };
}
async function loadState(){
  try {
    const d = await api('/fr/posts');
    posts = (d.posts||[]).map(adapt);
  } catch(e){ posts = []; toast('Load failed: '+e.message); }
  render();
}

function liWhenLabel(p){
  if(p.status==='published') return 'Published';
  if(p.status==='scheduled') return `Scheduled · ${fmtDate(p.date)} · ${p.time}`;
  return `Preview · goes out ${fmtDate(p.date)} · ${p.time}`;
}
function liMediaBlock(p, replace){

/* ---------- native confirm dialog ---------- */
let cfResolver = null;
function confirmDialog({title, msg, ok='Confirm', danger=false}){
  document.getElementById('cf-title').textContent = title;
  document.getElementById('cf-msg').textContent = msg;
  const ic = document.getElementById('cf-ic');
  ic.className = 'cf-ic ' + (danger?'warn':'go');
  ic.innerHTML = danger
    ? '<svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m1 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>'
    : '<svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>';
  const okb = document.getElementById('cf-ok');
  okb.textContent = ok; okb.className = 'btn ' + (danger?'senddark':'schedule');
  document.getElementById('cf-scrim').classList.add('open');
  return new Promise(res => { cfResolver = res; });
}
function cfResolve(v){ document.getElementById('cf-scrim').classList.remove('open'); if(cfResolver){ cfResolver(v); cfResolver=null; } }

async function deletePost(id){
  const p = posts.find(x=>x.id===id); if(!p) return;
  const ok = await confirmDialog({
    title:'Delete this post?',
    msg: p.status==='scheduled' ? 'It will be pulled from the schedule and won’t be published.' : 'This removes it from the review queue.',
    ok:'Delete', danger:true });
  if(!ok) return;
  try { await api('/fr/posts/'+id, { method:'DELETE' }); closeModal(); await loadState(); toast('Post deleted'); }
  catch(e){ toast('Delete failed: '+e.message); }
}
function scheduleFromModal(){
  const p=posts.find(x=>x.id===modalId); if(!p) return;
  p.cap = document.getElementById('m-caption').value;
  p.date = document.getElementById('m-date').value || p.date;
  p.time = document.getElementById('m-time').value || p.time;
  schedulePost(p.id);
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'),2400);
}

function setFounder(f){ founder = f; composeOpen = false; npImg = null; npMediaKey = null; npMediaKind = null; closeModal(); render(); window.scrollTo({top:0}); }
function setTab(t){ tab = t; render(); }

function render(){
  document.getElementById('fs-trevor').classList.toggle('on', founder==='trevor');
  document.getElementById('fs-nikola').classList.toggle('on', founder==='nikola');
  for(const t of ['feed','cal','stats']){
    document.getElementById('tab-'+t).classList.toggle('on', tab===t);
    document.getElementById('view-'+t).hidden = tab!==t;
  }

  const mine = posts.filter(p=>p.f===founder);
  const toReview = mine.filter(p=>p.status==='review').length;
  const badge = document.getElementById('badge-feed');
  badge.textContent = toReview; badge.style.display = toReview? '':'none';
  document.getElementById('band-sub').textContent =
    (toReview? `${toReview} post${toReview>1?'s':''} waiting for you` : 'All caught up') + ' · LinkedIn';

  renderFeed(mine); renderCal(); if(tab==='stats') renderStats();
}

/* ---------- inline compose ---------- */
let npDraft = '', npMediaKey = null, npMediaKind = null, npDate = '2026-07-27', npTime = '09:30';
function composePreviewCard(){
  return liPreview({ f:founder, cap:npDraft, img:npImg, vid:(npMediaKind==='video'), status:'review', date:npDate, time:npTime }, {edit:false});
}
function composeHtml(){
  if(!composeOpen) return `
    <button class="plus-card" onclick="openCompose()">
      <span class="plus">${LI_ICONS.plus}</span> New post for ${FOUNDERS[founder].name}
    </button>`;
  return `<div class="compose">
    <h3>New post for ${FOUNDERS[founder].name}</h3>
    <textarea id="np-cap" placeholder="Write the post text…" oninput="onComposeInput()">${esc(npDraft)}</textarea>
    <div class="c-up" id="np-up" onclick="document.getElementById('np-file').click()">
      ${npImg? `<img src="${npImg}" alt=""><span>Change visual</span>` : `<span>Click to upload visual (image or video)</span>`}
    </div>
    <div class="c-row">Goes out:
      <input type="date" id="np-date" value="${npDate}" onchange="npDate=this.value;refreshPreview()">
      <input type="time" id="np-time" value="${npTime}" onchange="npTime=this.value;refreshPreview()">
    </div>
    <div>
      <div class="asec" style="margin:2px 2px 8px">Preview on LinkedIn</div>
      <div id="np-preview">${composePreviewCard()}</div>
    </div>
    <div class="p-actions" style="padding:0">
      <button class="btn schedule" onclick="createPost()">Add post</button>
      <button class="btn" onclick="cancelCompose()">Cancel</button>
    </div>
  </div>`;
}
function refreshPreview(){ const el=document.getElementById('np-preview'); if(el) el.innerHTML=composePreviewCard(); }
function onComposeInput(){ npDraft = document.getElementById('np-cap').value; refreshPreview(); }
function openCompose(){ composeOpen = true; render(); requestAnimationFrame(()=>document.getElementById('np-cap')?.focus()); }
function cancelCompose(){ composeOpen = false; npImg = null; npMediaKey = null; npMediaKind = null; npDraft = ''; render(); }
function keepDraft(){ const el = document.getElementById('np-cap'); if(el) npDraft = el.value; }
function npFile(inp){
  const file = inp.files[0]; if(!file) return;
  keepDraft();
  const up = document.getElementById('np-up');
  const r = new FileReader(); r.onload = ()=>{ npImg = r.result; refreshPreview(); }; r.readAsDataURL(file);
  if(up) up.innerHTML = '<span>Uploading…</span>';
  uploadFile(file).then(res=>{
    npMediaKey = res.key; npMediaKind = res.kind; render();
  }).catch(e=>{ toast('Upload failed: '+e.message); npImg=null; render(); });
  inp.value = '';
}
async function createPost(){
  keepDraft();
  const cap = (npDraft||'').trim();
  if(!cap){ document.getElementById('np-cap').focus(); toast('Write the post text first'); return; }
  const type = npMediaKind==='video' ? 'Video' : (npMediaKey ? 'Image' : 'Text');
  try {
    await api('/fr/posts', { method:'POST', body: JSON.stringify({
      founder, type, caption: cap,
      mediaKeys: npMediaKey ? [npMediaKey] : [],
      mediaKind: npMediaKind,
      date: npDate, time: npTime,
    })});
    composeOpen = false; npImg = null; npMediaKey = null; npMediaKind = null; npDraft = '';
    await loadState(); toast(`Added to ${FOUNDERS[founder].name}'s posts`);
  } catch(e){ toast('Could not add: '+e.message); }
}

/* ---------- founder feed ---------- */
function renderFeed(mine){
  const order = {review:0,rejected:1,scheduled:2,published:3};
  const list = [...mine].sort((a,b)=> order[a.status]-order[b.status] || a.date.localeCompare(b.date));
  const f = FOUNDERS[founder];
  const trash = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m1 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>';
  document.getElementById('view-feed').innerHTML = composeHtml() + list.map(p=>{
    const s = STATUS[p.status];
    const done = p.status==='published';
    return `<article class="post st-${p.status}" id="post-${p.id}">
      <div class="rev-bar">
        <span class="pill ${s.cls}">${p.status==='review'?'Waiting for you':s.label}</span>
        ${done?'':`<span class="rev-when">Goes out
          <input type="date" value="${p.date||''}" onchange="editWhen('${p.id}',this.value,null)">
          <input type="time" value="${p.time||''}" onchange="editWhen('${p.id}',null,this.value)"></span>`}
      </div>
      ${liPreview(p, {edit:!done, capOnChange:`editCap('${p.id}',this.value)`})}
      ${p.note? `<div class="p-note"><b>Your note to Braca</b>${esc(p.note)}</div>`:''}
      ${done? '' : `
      <div class="p-actions">
        <button class="btn schedule" onclick="schedulePost('${p.id}')" ${p.status==='scheduled'?'disabled':''}>${p.status==='scheduled'?'Scheduled ✓':'Schedule'}</button>
        <button class="btn reject" onclick="toggleReason('${p.id}')">Not approved</button>
        <button class="btn delete" onclick="deletePost('${p.id}')" title="Delete post" aria-label="Delete post">${trash}</button>
      </div>
      <div class="p-reason" id="reason-${p.id}">
        <label>What's wrong with it? Braca will fix it.</label>
        <textarea id="reason-txt-${p.id}" placeholder="e.g. This doesn't sound like me, make it more casual...">${esc(p.note)}</textarea>
        <div class="row">
          <button class="btn sm" onclick="toggleReason('${p.id}',true)">Cancel</button>
          <button class="btn sm senddark" onclick="sendReason('${p.id}')">Send</button>
        </div>
      </div>`}
    </article>`;
  }).join('') + (list.length? `<p class="feed-done">That's ${list.length} post${list.length>1?'s':''} for ${f.name}.</p>` : `<p class="feed-done">No posts yet. Hit + to create the first one.</p>`);
  document.querySelectorAll('#view-feed textarea.li-text').forEach(autoGrow);
}

async function editCap(id,v){
  const p=posts.find(x=>x.id===id); if(!p) return;
  p.cap=v; p.caption=v;
  try { await api('/fr/posts/'+id, { method:'PATCH', body: JSON.stringify({caption:v}) }); toast('Text saved'); }
  catch(e){ toast('Save failed: '+e.message); }
}
async function editWhen(id,d,t){
  const p=posts.find(x=>x.id===id); if(!p) return;
  if(d) p.date=d; if(t) p.time=t;
  try { await api('/fr/posts/'+id, { method:'PATCH', body: JSON.stringify(d?{date:d}:{time:t}) });
    toast(`Moved to ${fmtDate(p.date)} · ${p.time}`); render(); }
  catch(e){ toast('Save failed: '+e.message); }
}
async function schedulePost(id){
  const p=posts.find(x=>x.id===id); if(!p) return;
  const ok = await confirmDialog({
    title:'Schedule this post?',
    msg:`It goes out ${fmtDate(p.date)} at ${p.time}. Made a mistake? No stress, you can still edit or delete it from the Calendar until it publishes.`,
    ok:'Schedule' });
  if(!ok) return;
  toast('Scheduling…');
  try {
    await api('/fr/posts/'+id+'/schedule', { method:'POST', body: JSON.stringify({date:p.date, time:p.time, caption:p.cap}) });
    closeModal(); await loadState(); toast(`Scheduled for ${fmtDate(p.date)} · ${p.time} ✓`);
  } catch(e){ toast('Schedule failed: '+e.message); }
}
function toggleReason(id,close){
  const el=document.getElementById('reason-'+id);
  if(close){ el.classList.remove('open'); return; }
  el.classList.toggle('open');
  if(el.classList.contains('open')) document.getElementById('reason-txt-'+id).focus();
}
async function sendReason(id){
  const p=posts.find(x=>x.id===id); if(!p) return;
  const txt=document.getElementById('reason-txt-'+id).value.trim();
  if(!txt){ document.getElementById('reason-txt-'+id).focus(); return; }
  try { await api('/fr/posts/'+id+'/reject', { method:'POST', body: JSON.stringify({note:txt}) });
    await loadState(); toast('Sent to Braca. He will fix it and it comes back here.'); }
  catch(e){ toast('Failed: '+e.message); }
}

/* ---------- calendar (July 2026: 31 days, Jul 1 = Wed, pad 2, Mon-first) ---------- */
function renderCal(){
  const mine = posts.filter(p=>p.f===founder);
  const dows=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let html = dows.map(d=>`<div class="dow">${d}</div>`).join('');
  const pad=2, days=31, today=14;
  for(let i=0;i<pad;i++) html+=`<div class="day pad"></div>`;
  for(let d=1;d<=days;d++){
    const iso=`2026-07-${String(d).padStart(2,'0')}`;
    const dots = mine.filter(p=>p.date===iso).map(p=>{
      const drag = p.status!=='published';
      return `<button class="dot ${STATUS[p.status].cls}" title="${p.time} · ${esc((p.cap||'').split('\n')[0])}"
        draggable="${drag}" ondragstart="dragStart(event,'${p.id}')" onclick="openModal('${p.id}')"></button>`;
    }).join('');
    html+=`<div class="day${d===today?' today':''}" data-iso="${iso}"
      ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event)">
      <span class="dn">${d}</span><span class="dots">${dots}</span></div>`;
  }
  const tail=(pad+days)%7; if(tail) for(let i=tail;i<7;i++) html+=`<div class="day pad"></div>`;
  document.getElementById('cal-grid').innerHTML = html;
}
function dragStart(e,id){ e.dataTransfer.setData('text/plain',id); e.dataTransfer.effectAllowed='move'; }
function dragOver(e){ e.preventDefault(); e.currentTarget.classList.add('dragover'); }
function dragLeave(e){ e.currentTarget.classList.remove('dragover'); }
async function drop(e){
  e.preventDefault(); e.currentTarget.classList.remove('dragover');
  const id=e.dataTransfer.getData('text/plain');
  const p=posts.find(x=>x.id===id); const iso=e.currentTarget.dataset.iso;
  if(p&&iso&&p.date!==iso&&p.status!=='published'){
    p.date=iso; render();
    try { await api('/fr/posts/'+id, { method:'PATCH', body: JSON.stringify({date:iso}) }); toast(`Moved to ${fmtDate(iso)} · ${p.time}`); }
    catch(err){ toast('Move failed: '+err.message); loadState(); }
  }
}

/* ---------- modal ---------- */
function openModal(id){
  modalId = id;
  const p = posts.find(x=>x.id===id); if(!p) return;
  const s = STATUS[p.status];
  const done = p.status==='published';
  document.getElementById('m-pill').className = 'pill '+s.cls;
  document.getElementById('m-pill').textContent = s.label;
  const canSchedule = p.status==='review' || p.status==='rejected';
  const trash = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m1 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>';
  document.getElementById('m-body').innerHTML = `
    ${done? '' : `<div class="rev-bar" style="padding:0 0 2px"><span class="rev-when" style="margin-left:0">Goes out
      <input type="date" id="m-date" value="${p.date||''}">
      <input type="time" id="m-time" value="${p.time||''}"></span></div>`}
    ${liPreview(p, {edit:!done, capId:'m-caption', replace:!done})}
    ${p.note? `<div class="p-note" style="margin:0"><b>Your note to Braca</b>${esc(p.note)}</div>`:''}
    ${done? '' : `<div class="m-actions">
      <button class="btn schedule" onclick="saveModal()">Save changes</button>
      ${canSchedule? `<button class="btn" onclick="scheduleFromModal()">Schedule</button>`:''}
      <button class="btn reject" onclick="rejectFromModal()">Not approved</button>
      <button class="btn delete" onclick="deletePost('${p.id}')" title="Delete post">${trash}</button>
    </div>`}`;
  document.querySelectorAll('#m-body textarea.li-text').forEach(autoGrow);
  document.getElementById('scrim').classList.add('open');
}
function closeModal(){ modalId=null; document.getElementById('scrim').classList.remove('open'); }
async function saveModal(){
  const p=posts.find(x=>x.id===modalId); if(!p) return;
  const caption = document.getElementById('m-caption').value;
  const date = document.getElementById('m-date').value || p.date;
  const time = document.getElementById('m-time').value || p.time;
  try {
    await api('/fr/posts/'+p.id, { method:'PATCH', body: JSON.stringify({caption, date, time}) });
    closeModal(); await loadState();
    toast(`Saved. Goes out ${fmtDate(date)} · ${time}`);
  } catch(e){ toast('Save failed: '+e.message); }
}
function rejectFromModal(){
  const p=posts.find(x=>x.id===modalId); if(!p) return;
  closeModal(); setTab('feed');
  requestAnimationFrame(()=>{
    const el=document.getElementById('post-'+p.id);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
    toggleReason(p.id);
  });
}
async function modalFile(inp){
  const p=posts.find(x=>x.id===modalId); const file=inp.files[0];
  if(!p||!file) return;
  inp.value='';
  toast('Uploading…');
  try {
    const up = await uploadFile(file);
    await api('/fr/posts/'+p.id, { method:'PATCH', body: JSON.stringify({mediaKeys:[up.key], mediaKind:up.kind}) });
    await loadState();
    const np = posts.find(x=>x.id===p.id); if(np) openModal(np.id);
    toast('New visual attached');
  } catch(e){ toast('Upload failed: '+e.message); }
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

/* ---------- stats (real data from the Worker; engagement grows as posts publish) ---------- */
async function renderStats(){
  const el = document.getElementById('view-stats');
  const f = FOUNDERS[founder];
  try {
    const s = await api('/fr/stats?founder='+founder);
    const pub = (s.posts||[]).filter(x=>x.status==='published').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const hasMetrics = pub.some(x=>x.metrics);
    el.innerHTML = `
      <div class="stat-row">
        <div class="stat"><div class="k">${s.published||0}</div><div class="l">Published</div></div>
        <div class="stat"><div class="k">${s.scheduled||0}</div><div class="l">Scheduled ahead</div></div>
        <div class="stat"><div class="k">${s.review||0}</div><div class="l">Waiting for review</div></div>
      </div>

      <div class="card">
        <div class="card-head"><div><h3>${f.name} on LinkedIn</h3>
          <div class="sub">${pub.length? pub.length+' published so far' : 'Nothing published yet. Numbers appear here as posts go live.'}</div></div></div>
        ${pub.length ? `
        <div class="ptable-wrap">
          <table class="ptable">
            <thead><tr><th>Post</th><th>Impressions</th><th>Reactions</th><th>Comments</th><th>Eng. rate</th></tr></thead>
            <tbody>
              ${pub.map(p=>{
                const m = p.metrics;
                const cell = v => m && v!=null ? fmtN(v) : '·';
                return `<tr>
                  <td><span class="pt">${esc((p.caption||'').split('\n')[0].slice(0,60))}${(p.caption||'').split('\n')[0].length>60?'...':''}</span>
                      <span class="pd">${p.type} · ${p.date? fmtDate(p.date):''}</span></td>
                  <td>${cell(m&&m.impressions)}</td><td>${cell(m&&m.reactions)}</td>
                  <td>${cell(m&&m.comments)}</td><td class="eng">${m&&m.engRate!=null? m.engRate.toFixed(1)+'%':'·'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>` : `<p class="feed-done" style="padding:8px 0">Schedule and publish a post to start measuring.</p>`}
        ${!hasMetrics ? `<div class="p-note" style="margin:12px 0 0"><b>Engagement metrics</b>Impressions, reactions and comments fill in once we wire LinkedIn analytics (separate from publishing). Publishing itself is live.</div>` : ''}
      </div>`;
  } catch(e){
    el.innerHTML = `<div class="card"><div class="sub">Stats unavailable: ${esc(e.message)}</div></div>`;
  }
}

loadState();
</script>
